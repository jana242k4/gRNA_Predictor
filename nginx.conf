events {
    worker_connections 1024;
}

http {
    # Rate limit zone — mirrors slowapi 30/min on /predict
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=omics:10m rate=20r/m;

    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # Redirect HTTP → HTTPS if you have a domain + SSL cert.
        # If running HTTP-only (IP address only), remove this block
        # and keep only the location blocks below.
        # return 301 https://$host$request_uri;

        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # Pass slowapi rate-limit headers to client
            proxy_pass_header  X-RateLimit-Limit;
            proxy_pass_header  X-RateLimit-Remaining;
            proxy_pass_header  Retry-After;
        }
    }

    # Uncomment this block and fill in your domain + cert paths for HTTPS:
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location /health { proxy_pass http://backend/health; }
    #
    #     location /api/ {
    #         limit_req zone=api burst=10 nodelay;
    #         proxy_pass         http://backend;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $remote_addr;
    #         proxy_set_header   X-Forwarded-Proto https;
    #         proxy_read_timeout 120s;
    #     }
    # }
}
