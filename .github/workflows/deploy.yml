name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    needs: build
    runs-on: ubuntu-latest
    # Only runs when ORACLE_VM_IP secret is set — skip silently if not configured yet
    if: ${{ secrets.ORACLE_VM_IP != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to Oracle Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ~/gRNA_Predictor
            git pull origin main
            docker compose build backend
            docker compose up -d --no-deps backend
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 12); do
              curl -sf http://localhost:8000/health && echo "Backend healthy." && exit 0
              sleep 5
            done
            echo "Backend health check failed after 60s" && exit 1
